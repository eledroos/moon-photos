name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  schedule:
    # Rebuild every hour to pick up new NASA photos
    - cron: '0 * * * *'
  workflow_dispatch: # Manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download assets (textures + star catalog)
        run: npm run setup

      - name: Create config with API key
        run: |
          cat config.example.json | sed "s/YOUR_KEY_HERE/${{ secrets.NASA_API_KEY }}/" > config.json

      - name: Build static site with data
        run: bash scripts/build-static.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=artemis-ii-photos
